<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Buscaminas Deluxe</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    overflow:hidden;
}

.container{
    width:95%;
    max-width:950px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:25px;
    box-shadow:0 0 35px rgba(0,0,0,.5);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:15px;
}

.title{
    font-size:2rem;
    font-weight:bold;
    color:#60a5fa;
}

.stats{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:12px 20px;
    border-radius:15px;
    text-align:center;
    min-width:100px;
}

.card h3{
    font-size:0.9rem;
    color:#cbd5e1;
}

.card span{
    font-size:1.5rem;
    font-weight:bold;
}

.controls{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
    font-size:1rem;
}

button:hover{
    transform:scale(1.05);
}

.easy{
    background:#22c55e;
    color:white;
}

.medium{
    background:#f59e0b;
    color:white;
}

.hard{
    background:#ef4444;
    color:white;
}

.restart{
    background:#3b82f6;
    color:white;
}

.board{
    display:grid;
    gap:4px;
    justify-content:center;
}

.cell{
    width:40px;
    height:40px;
    background:#334155;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    user-select:none;
    font-weight:bold;
    font-size:1.1rem;
    transition:.15s;
    box-shadow:inset 0 -4px rgba(0,0,0,.3);
}

.cell:hover{
    filter:brightness(1.15);
}

.revealed{
    background:#cbd5e1;
    color:#111827;
    box-shadow:none;
}

.mine{
    background:#ef4444 !important;
    color:white;
}

.flag{
    background:#f59e0b;
}

.win-screen,
.lose-screen{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    display:none;
}

.popup{
    background:#1e293b;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.5);
    animation:show .3s ease;
}

@keyframes show{
    from{
        transform:scale(.6);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.popup h1{
    margin-bottom:10px;
    font-size:2.5rem;
}

.popup p{
    margin-bottom:20px;
    color:#cbd5e1;
}

.popup button{
    background:#3b82f6;
    color:white;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
    font-size:.9rem;
}

.number1{color:#2563eb;}
.number2{color:#16a34a;}
.number3{color:#dc2626;}
.number4{color:#7c3aed;}
.number5{color:#b45309;}
.number6{color:#0891b2;}
.number7{color:#111827;}
.number8{color:#475569;}

@media(max-width:700px){

    .cell{
        width:32px;
        height:32px;
        font-size:.9rem;
    }

    .title{
        font-size:1.5rem;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="top">

        <div class="title">💣 Buscaminas De Fer</div>

        <div class="stats">

            <div class="card">
                <h3>💣 Minas</h3>
                <span id="mineCount">10</span>
            </div>

            <div class="card">
                <h3>🚩 Banderas</h3>
                <span id="flags">0</span>
            </div>

            <div class="card">
                <h3>⏱ Tiempo</h3>
                <span id="timer">0</span>
            </div>

        </div>

    </div>

    <div class="controls">
        <button class="easy" onclick="setDifficulty('easy')">Fácil</button>
        <button class="medium" onclick="setDifficulty('medium')">Medio</button>
        <button class="hard" onclick="setDifficulty('hard')">Difícil</button>
        <button class="restart" onclick="startGame()">🔄 Reiniciar</button>
    </div>

    <div class="board" id="board"></div>

    <div class="footer">
        Click izquierdo = abrir | Click derecho = bandera 🚩
    </div>

</div>

<div class="win-screen" id="winScreen">
    <div class="popup">
        <h1>🏆 ¡Ganaste!</h1>
        <p>Encontraste todas las minas.</p>
        <button onclick="startGame()">Jugar otra vez</button>
    </div>
</div>

<div class="lose-screen" id="loseScreen">
    <div class="popup">
        <h1>💥 Perdiste</h1>
        <p>Explotaste una mina.</p>
        <button onclick="startGame()">Intentar otra vez</button>
    </div>
</div>

<script>

const board = document.getElementById("board");

let rows = 10;
let cols = 10;
let mines = 10;

let grid = [];
let revealed = 0;
let flags = 0;
let gameOver = false;
let timer = 0;
let timerInterval;

function setDifficulty(level){

    if(level === "easy"){
        rows = 10;
        cols = 10;
        mines = 10;
    }

    if(level === "medium"){
        rows = 14;
        cols = 14;
        mines = 30;
    }

    if(level === "hard"){
        rows = 18;
        cols = 18;
        mines = 55;
    }

    startGame();
}

function startGame(){

    clearInterval(timerInterval);

    timer = 0;
    document.getElementById("timer").innerText = timer;

    timerInterval = setInterval(()=>{
        timer++;
        document.getElementById("timer").innerText = timer;
    },1000);

    document.getElementById("winScreen").style.display = "none";
    document.getElementById("loseScreen").style.display = "none";

    board.innerHTML = "";
    grid = [];
    revealed = 0;
    flags = 0;
    gameOver = false;

    document.getElementById("mineCount").innerText = mines;
    document.getElementById("flags").innerText = flags;

    board.style.gridTemplateColumns = `repeat(${cols},1fr)`;

    for(let r=0;r<rows;r++){

        grid[r] = [];

        for(let c=0;c<cols;c++){

            let cell = {
                mine:false,
                revealed:false,
                flag:false,
                number:0,
                element:null
            };

            let div = document.createElement("div");
            div.className = "cell";

            div.addEventListener("click",()=>revealCell(r,c));

            div.addEventListener("contextmenu",(e)=>{
                e.preventDefault();
                toggleFlag(r,c);
            });

            board.appendChild(div);

            cell.element = div;

            grid[r][c] = cell;

        }

    }

    placeMines();
    calculateNumbers();

}

function placeMines(){

    let placed = 0;

    while(placed < mines){

        let r = Math.floor(Math.random()*rows);
        let c = Math.floor(Math.random()*cols);

        if(!grid[r][c].mine){

            grid[r][c].mine = true;
            placed++;

        }

    }

}

function calculateNumbers(){

    for(let r=0;r<rows;r++){

        for(let c=0;c<cols;c++){

            if(grid[r][c].mine) continue;

            let count = 0;

            for(let dr=-1;dr<=1;dr++){

                for(let dc=-1;dc<=1;dc++){

                    let nr = r + dr;
                    let nc = c + dc;

                    if(
                        nr >=0 &&
                        nr < rows &&
                        nc >=0 &&
                        nc < cols &&
                        grid[nr][nc].mine
                    ){
                        count++;
                    }

                }

            }

            grid[r][c].number = count;

        }

    }

}

function revealCell(r,c){

    if(gameOver) return;

    let cell = grid[r][c];

    if(cell.revealed || cell.flag) return;

    cell.revealed = true;
    revealed++;

    cell.element.classList.add("revealed");

    if(cell.mine){

        cell.element.innerHTML = "💣";
        cell.element.classList.add("mine");

        endGame(false);
        return;

    }

    if(cell.number > 0){

        cell.element.innerText = cell.number;
        cell.element.classList.add(`number${cell.number}`);

    }else{

        for(let dr=-1;dr<=1;dr++){

            for(let dc=-1;dc<=1;dc++){

                let nr = r + dr;
                let nc = c + dc;

                if(
                    nr >=0 &&
                    nr < rows &&
                    nc >=0 &&
                    nc < cols
                ){
                    revealCell(nr,nc);
                }

            }

        }

    }

    checkWin();

}

function toggleFlag(r,c){

    if(gameOver) return;

    let cell = grid[r][c];

    if(cell.revealed) return;

    cell.flag = !cell.flag;

    if(cell.flag){
        cell.element.innerHTML = "🚩";
        cell.element.classList.add("flag");
        flags++;
    }else{
        cell.element.innerHTML = "";
        cell.element.classList.remove("flag");
        flags--;
    }

    document.getElementById("flags").innerText = flags;

}

function endGame(win){

    gameOver = true;

    clearInterval(timerInterval);

    for(let r=0;r<rows;r++){

        for(let c=0;c<cols;c++){

            let cell = grid[r][c];

            if(cell.mine){

                cell.element.innerHTML = "💣";
                cell.element.classList.add("mine");

            }

        }

    }

    if(win){
        document.getElementById("winScreen").style.display = "flex";
    }else{
        document.getElementById("loseScreen").style.display = "flex";
    }

}

function checkWin(){

    if(revealed === (rows*cols)-mines){
        endGame(true);
    }

}

startGame();

</script>

</body>
</html>
